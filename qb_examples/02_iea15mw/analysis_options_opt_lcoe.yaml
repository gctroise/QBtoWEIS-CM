general:
    folder_output: iea15mw/opt_output
    fname_output: iea15mw_umaine_output


design_variables:
  floating:
    joints:
      flag: True
      z_coordinate:
          - names: [main_keel, col1_keel, col2_keel, col3_keel]
            lower_bound: -50
            upper_bound: -20
      r_coordinate:
          - names: [col1_keel, col1_freeboard, col2_keel, col2_freeboard, col3_keel, col3_freeboard]
            lower_bound: 35
            upper_bound: 75   
    members:
         flag: True
         groups:
           - names: [column1, column2, column3]
             diameter:
                 lower_bound: 10.0
                 upper_bound: 16.0
                 constant: True

# merit_figure: platform_mass  # Merit figure of the optimization problem. The options are 'AEP' - 'LCOE' - 'Cp' - 'blade_mass' - 'blade_tip_deflection'
merit_figure: LCOE
# merit_figure_user: 
#   name: financese.lcoe

constraints:
  qblade_failed: 
    flag: True # Constrain design to one where QBlade simulations don't fail
  control:
    Max_PtfmPitch:
      flag: True
      max: 10
    Std_PtfmPitch:
      flag: True
      max: 4

driver:
  optimization:
    flag: True
    tol: 1.e-5            # Optimality tolerance
    max_iter: 30          # Maximum number of iterations (SLSQP)
    solver: LN_COBYLA     # Optimization solver. Other options are 'SLSQP' - 'CONMIN'
    
recorder:
    flag: True              # Flag to activate OpenMDAO recorder
    file_name: log_iea15mw_umaine.sql  # Name of OpenMDAO recorder
    includes: ['*floating*','*finance*','*myopex*']
